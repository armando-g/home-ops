apiVersion: v1
kind: Service
metadata:
  name: unraid-external-svc
  namespace: network
spec:
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
---
apiVersion: v1
kind: Endpoints
metadata:
  name: unraid-external-svc
  namespace: network
subsets:
  - addresses:
      - ip: 192.168.20.5
    ports:
      - name: http
        port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: unraid-route
  namespace: network
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
  hostnames:
    - "unraid.armando.sh"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: unraid-external-svc
          port: 80
