---
originRequest:
  http2Origin: true
  keepAliveTimeout: 3600s
  tcpKeepAlive: 7200s
  originServerName: "external.armando.sh"

ingress:
  - hostname: "armando.sh"
    service: &svc https://envoy-external.network.svc.cluster.local
  - hostname: "*.armando.sh"
    service: *svc
  - service: http_status:404
